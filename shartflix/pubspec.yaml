name: shartflix
description: "Shartflix - A Netflix-style movie app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0

  # Dependency injection
  get_it: ^8.0.3

  # Navigation
  go_router: ^14.6.1

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Images
  cached_network_image: ^3.4.1

  # Image picker
  image_picker: ^1.1.2

  # Animations
  lottie: ^3.1.3

  # Logging
  logger: ^2.5.0

  # Functional programming
  dartz: ^0.10.1

  # Localization
  intl: ^0.20.2

  # Fonts
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.1
  firebase_analytics: ^11.4.1

  # Splash screen
  flutter_native_splash: ^2.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0a0a0a"
  image: assets/images/splash_logo.png
  color_dark: "#0a0a0a"
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#0a0a0a"
    image: assets/images/splash_logo.png

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/animations/

